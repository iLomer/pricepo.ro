<table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color:#fafaf9;padding:40px 0">
  <tr>
    <td align="center">
      <table width="480" border="0" cellspacing="0" cellpadding="0" style="background-color:#ffffff;border-radius:12px;border:1px solid #e7e5e4;overflow:hidden">
        <!-- Header -->
        <tr>
          <td style="background-color:#1c1917;padding:24px 32px;text-align:center">
            <img src="https://prevo.ro/logo-email.svg" alt="prevo" width="120" height="32" style="display:block;margin:0 auto" />
          </td>
        </tr>
        <!-- Body -->
        <tr>
          <td style="padding:32px 32px 24px">
            <h1 style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:22px;font-weight:700;color:#1c1917;margin:0 0 12px">Confirma contul tau</h1>
            <p style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:24px;color:#78716c;margin:0 0 24px">
              Multumim ca te-ai inregistrat pe Prevo. Apasa butonul de mai jos pentru a-ti confirma adresa de email si a-ti activa contul.
            </p>
            <table border="0" cellspacing="0" cellpadding="0" style="margin:0 auto">
              <tr>
                <td align="center" style="background-color:#1c1917;border-radius:8px">
                  <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:12px 32px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none">Confirma adresa de email</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td style="padding:0 32px 32px">
            <hr style="border:none;border-top:1px solid #e7e5e4;margin:24px 0" />
            <p style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:12px;color:#a8a29e;margin:0;line-height:20px">
              Daca nu ai creat un cont pe Prevo, poti ignora acest email.
            </p>
            <p style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:12px;color:#a8a29e;margin:8px 0 0;line-height:20px">
              prevo.ro — Educatie fiscala pentru PFA si SRL
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
